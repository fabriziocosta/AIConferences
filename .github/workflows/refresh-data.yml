name: Refresh Conference Data

on:
  schedule:
    - cron: "0 9 5 1 *"
    - cron: "0 9 5 7 *"
  workflow_dispatch:
    inputs:
      current_year:
        description: "First conference year to include"
        required: false
        type: string

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Choose conference year
        id: year
        run: |
          if [ -n "${{ github.event.inputs.current_year }}" ]; then
            echo "value=${{ github.event.inputs.current_year }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u +%Y)" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild dataset
        run: |
          python scripts/build_conference_dataset.py --current-year "${{ steps.year.outputs.value }}"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/conferences.csv data/geocode_cache.json

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Refresh conference data"
            git push
          fi
